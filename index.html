        // [AI Scope] 來源: CASP checklists_No local considerations 20260124.pdf
        llm_scope: `
        You are a Critical Appraisal Expert. Assess the following methodology domains strictly based on the text.

        const CORE_GRADE_RULES = `
        請嚴格依照以下 Core GRADE 評估流程對提供的論文進行評級。你是評估者，請根據論文內容回答下列邏輯問題並決定是否降級。

        1. **起始證據品質**：
           - 隨機分派研究 (RCT) => High (高)
           - 非隨機分派研究 (NRS) => Low (低)

        2. **降級評估 (逐項檢查)**：

        (1) **偏誤風險 (Risk of Bias)**:
           - Q1.1: 是否有整體評估為「高偏誤風險」的研究？(若無 -> 不降級)
           - Q1.2: 「高偏誤風險」權重是否超過 55-65%？(若否 -> 進入 Q1.4)
           - Q1.3: 高偏誤風險效應是否放大結果但未達門檻？或遮蓋效果但結果超乎預期？(若是 -> 不降級；若否 -> 降一級)
           - Q1.4: 不同偏誤風險研究的次組分析結果(如交互作用 P 值)是否顯著？(若無提供 -> 不降級)
           - Q1.5: 若差異顯著，建議使用低偏誤風險結果(不降級)；否則使用所有研究結果(不降級)。
           *輸出結論：是否降級？理由為何？*

        (2) **不一致性 (Inconsistency)**:
           - Q2.1: 森林圖中各研究點分佈差異大嗎？95% CI 重疊嗎？(若重疊 -> 不降級)
           - Q2.2: 點分佈在門檻單側還是雙側？(單側 -> 不降級)
           - Q2.3: 是否有可信任的次組分析解釋不一致性？(有 -> 不降級；無 -> 降一級)
           *輸出結論：是否降級？理由為何？*

        (3) **間接性 (Indirectness)**:
           - Q3.1: 研究與目標 PICO 相近嗎？(相近 -> 不降級)
           - Q3.2: 有證據支持不相近特徵(如年齡)會影響結果嗎？(有 -> 降級；無 -> 不降級)
           *輸出結論：是否降級？理由為何？*

        (4) **不精確性 (Imprecision)**:
           - **關鍵參數**：使用者設定的閾值為 {{THRESHOLD_TYPE}} (值: {{THRESHOLD_VALUE}})。
           - Q4.2: 合併結果的 95% CI 是否超過上述門檻？(是 -> 降一級)
           - Q4.3: 95% CI 是否同時超過好處與壞處的門檻(區間極寬)？(是 -> 降兩級)
           - Q4.4: 點估計值是否落在中/大型效應範圍？(中型 -> 不降級；大型 -> 繼續)
           - Q4.6 (二變項): RR CI比值 >= 3 或 OR CI比值 >= 2.5？(是 -> 降兩級)
           - Q4.7/4.8 (連續/樣本數): 樣本數是否大於 OIS (Optimal Information Size)？(否 -> 降一級；不足 30% -> 降兩級)
           *輸出結論：是否降級？理由為何？*

        (5) **發表性偏誤 (Publication Bias)**:
           - Q5.1: 絕大多數研究是小型且廠商贊助？(是 -> 降級)
           - Q5.3: 漏斗圖不對稱或 Egger test 顯著？(是 -> 降級)
           - Q5.4: 有未被發表的顯著研究嗎？(有 -> 降級)
           *輸出結論：是否降級？理由為何？*

        3. **總結**：
           - 計算最終等級 (High / Moderate / Low / Very Low)。
           - 若起始為 Low (NRS)，可考慮升級項目 (效應值很大、劑量反應關係等)，但主要關注上述降級。
        `;

        // --- 通用 Gemini AI 呼叫服務 ---
async function callGemini(prompt, systemInstruction, isJson = false, options = {}) {
    const userKey = localStorage.getItem('ebm_gemini_api_key');
    const userModel = localStorage.getItem('ebm_gemini_model') || "gemini-2.5-flash";

    if (!userKey) throw new Error("Missing API Key");

    const model = userModel; 
    const temperature = options.temperature ?? 0.7;
    const topP = options.topP ?? 0.95;

    // [修改點 1]：網址不再帶有 ?key=... 參數，讓網址列保持乾淨
    const url = `https://generativelanguage.googleapis.com/v1beta/models/${model}:generateContent`;

    for (let i = 0; i < 5; i++) {
        try {
            const payload = {
                contents: [{ parts: [{ text: prompt }] }],
                systemInstruction: { parts: [{ text: systemInstruction }] },
                generationConfig: {
                    temperature: temperature,
                    topP: topP,
                    responseMimeType: isJson ? "application/json" : "text/plain"
                }
            };

            // [修改點 2]：將 Key 藏在 Headers 中 (x-goog-api-key)
            const response = await fetch(url, {
                method: 'POST',
                headers: { 
                    'Content-Type': 'application/json',
                    'x-goog-api-key': userKey // 這是更安全的做法
                },
                body: JSON.stringify(payload)
            });
            
            if (!response.ok) {
                const errorData = await response.json();
                throw new Error(errorData.error?.message || `HTTP ${response.status}`);
            }
            const result = await response.json();
            const text = result.candidates?.[0]?.content?.parts?.[0]?.text;
            return isJson ? JSON.parse(text) : text;
        } catch (err) {
            if (i === 4 || err.message.includes("not found")) throw err;
            await new Promise(r => setTimeout(r, 2000));
        }
    }
}

        // --- MeSH 查尋邏輯 ---
        async function lookupMeSHTerm(term) {
            try {
                const url = `https://id.nlm.nih.gov/mesh/lookup/term?label=${encodeURIComponent(term)}&match=exact&limit=5`;
                const response = await fetch(url, { headers: { 'Accept': 'application/json' } });
                if (!response.ok) return null;
                let data = await response.json();

                if (!data || data.length === 0) {
                    const fuzzyUrl = `https://id.nlm.nih.gov/mesh/lookup/term?label=${encodeURIComponent(term)}&match=contains&limit=5`;
                    const fuzzyRes = await fetch(fuzzyUrl, { headers: { 'Accept': 'application/json' } });
                    data = await fuzzyRes.json();
                }

                if (data && data.length > 0) {
                    const descriptor = data.find(item => item.resource && item.resource.includes('/mesh/D'));
                    if (descriptor) return descriptor.label;
                    const scr = data[0];
                    if (scr.resource && scr.resource.includes('/mesh/C')) {
                        const scrId = scr.resource.split('/').pop();
                        const detailUrl = `https://id.nlm.nih.gov/mesh/lookup/details?supplementaryConcept=${scrId}`;
                        const detailRes = await fetch(detailUrl, { headers: { 'Accept': 'application/json' } });
                        if (detailRes.ok) {
                            const details = await detailRes.json();
                            if (details.hm && details.hm.length > 0) return details.hm[0].label;
                        }
                    }
                    return scr.label;
                }
                return null;
            } catch (error) {
                return null;
            }
        }

        // --- PubMed Search Logic ---
        async function searchPubMed(query, count = 10) {
            const searchUrl = `https://eutils.ncbi.nlm.nih.gov/entrez/eutils/esearch.fcgi?db=pubmed&term=${encodeURIComponent(query)}&retmax=${count}&sort=relevance&retmode=json&api_key=${PUBMED_API_KEY}`;
            const searchRes = await fetch(searchUrl);
            const searchData = await searchRes.json();
            const totalCount = parseInt(searchData.esearchresult.count) || 0;
            const ids = searchData.esearchresult.idlist;
            if (!ids || ids.length === 0) return { results: [], totalCount: 0 };

            const fetchUrl = `https://eutils.ncbi.nlm.nih.gov/entrez/eutils/efetch.fcgi?db=pubmed&id=${ids.join(',')}&retmode=xml&api_key=${PUBMED_API_KEY}`;
            const fetchRes = await fetch(fetchUrl);
            const xmlText = await fetchRes.text();
            const parser = new DOMParser();
            const xmlDoc = parser.parseFromString(xmlText, "text/xml");
            const articles = xmlDoc.getElementsByTagName("PubmedArticle");
            
            const results = [];
            for (let i = 0; i < articles.length; i++) {
                const art = articles[i];
                const pmid = art.getElementsByTagName("PMID")[0]?.textContent || "";
                const title = art.getElementsByTagName("ArticleTitle")[0]?.textContent || "無標題";
                let abstract = Array.from(art.getElementsByTagName("AbstractText")).map(node => (node.getAttribute("Label") ? `${node.getAttribute("Label")}: ` : "") + node.textContent).join(" ");
                
                // Metadata Extraction
                const journalObj = art.getElementsByTagName("Journal")[0];
                const jTitle = journalObj.getElementsByTagName("ISOAbbreviation")[0]?.textContent || "";
                const year = journalObj.getElementsByTagName("Year")[0]?.textContent || "";
                
                const journalIssue = journalObj.getElementsByTagName("JournalIssue")[0];
                const pubDate = journalIssue?.getElementsByTagName("PubDate")[0];
                const month = pubDate?.getElementsByTagName("Month")[0]?.textContent || "";
                const day = pubDate?.getElementsByTagName("Day")[0]?.textContent || "";
                const volume = journalIssue?.getElementsByTagName("Volume")[0]?.textContent || "";
                const issue = journalIssue?.getElementsByTagName("Issue")[0]?.textContent || "";

                let pii = '';
                let doi = '';
                const eLocationIDs = art.getElementsByTagName("ELocationID");
                for (let j = 0; j < eLocationIDs.length; j++) {
                    const eLocId = eLocationIDs[j];
                    const eIdType = eLocId.getAttribute('EIdType');
                    if (eIdType === 'pii') {
                        pii = eLocId.textContent || '';
                    } else if (eIdType === 'doi') {
                        doi = eLocId.textContent || '';
                    }
                }

                results.push({ 
                    pmid, 
                    title, 
                    abstract: abstract || "無摘要", 
                    source: jTitle, 
                    year, 
                    month, 
                    day, 
                    volume, 
                    issue, 
                    pii, 
                    doi, 
                    url: `https://pubmed.ncbi.nlm.nih.gov/${pmid}/`, 
                    originalRank: i + 1 
                });
            }
            return { results, totalCount };
        }

        // --- PDF Extraction 全域函式 ---
        const extractTextFromPdf = async (file) => {
            const arrayBuffer = await file.arrayBuffer();
            
            if (!window.pdfjsLib) {
                const script = document.createElement('script');
                script.src = PDF_JS_SRC;
                document.head.appendChild(script);
                await new Promise((resolve) => script.onload = resolve);
            }
            
            if (window.pdfjsLib && !window.pdfjsLib.GlobalWorkerOptions.workerSrc) {
                window.pdfjsLib.GlobalWorkerOptions.workerSrc = PDF_JS_WORKER_SRC;
            }

            const loadingTask = window.pdfjsLib.getDocument({ data: arrayBuffer });
            const pdf = await loadingTask.promise;
            let fullText = '';
            const maxPages = Math.min(pdf.numPages, 30);
            for (let i = 1; i <= maxPages; i++) {
                const page = await pdf.getPage(i);
                const textContent = await page.getTextContent();
                fullText += textContent.items.map((item) => item.str).join(' ') + '\n';
            }
            return fullText;
        };

        const SearchTool = () => {

            const [expandedPmids, setExpandedPmids] = useState(new Set());
            const [selectedArticlePmids, setSelectedArticlePmids] = useState(new Set());

            const updateStep = (idx, status, msg) => {
                setSteps(prev => prev.map((s, i) => i === idx ? { ...s, status, message: msg } : s));
            };

            const handleSearch = async () => {
                if (!question.trim()) return;
                setTotalFound(0); setLoading(true); setError(null); setArticles([]); setEvidenceSummary(null);
                setAnalysisResults({ category: '', structure: null, meshKeywords: null });
                setSelectedArticlePmids(new Set());

                updateStep(0, 'in-progress', '分析中...');
                const typeRes = await callGemini(question, "Classify this clinical question: Therapy, Etiology, Prognosis, Diagnosis, or Prediction. Respond ONLY with the keyword.", false, config);
                const type = String(typeRes).trim();
                setAnalysisResults(prev => ({ ...prev, category: type }));

 // Appraisal Tool

 const AppraisalTool = () => {
  const [step, setStep] = useState(1);
  const [selectedType, setSelectedType] = useState(null);
  const [file, setFile] = useState(null);
  const [aiResult, setAiResult] = useState(null);
  const [humanAnswers, setHumanAnswers] = useState({});
  const [finalSummary, setFinalSummary] = useState(null);
  
  // Loading 狀態
  const [isLoading, setIsLoading] = useState(false);
  const [isReappraising, setIsReappraising] = useState(false);
  
  const [error, setError] = useState('');
  const [usedConfig, setUsedConfig] = useState(TASK_CONFIGS.appraisal);

  // 記錄使用者勾選要重新評讀的題號 Set
  const [reappraisalSelection, setReappraisalSelection] = useState(new Set());

  // Step 3: AI 初步評讀
  const handleInitialAiAppraisal = async () => {
    if (!selectedType || !file) return;
    setIsLoading(true); setStep(3); setError('');
    
    try {
      const config = TASK_CONFIGS.appraisal;
      setUsedConfig(config);
      const text = await extractTextFromPdf(file);
      const knowledge = KNOWLEDGE_BASE[selectedType];
      
      const prompt = `
        你的任務是對醫學文獻進行「方法學品質評讀」。
        
        研究類型：${knowledge.title}
        評讀標準 (AI Scope)：${knowledge.llm_scope}
        文獻內容：${text.substring(0, 35000)}

        [重要過濾規則]
        1. 請**嚴格只針對**評讀標準中有「數字標號」或「英數混合標號」的項目（例如：1, 2, 3a, 3b, 6.1 等）建立評讀結果。
        2. 請**忽略**像 "Section A", "Section B" 這樣的段落標題。
        3. 請**忽略**沒有標號的純文字敘述或子彈列點（bullet points），除非它是上述標號題目下的具體指引。

        請回傳 JSON 格式，嚴格遵守以下結構：
        {
            "basic_info": { 
                "title": "文獻標題 (原文)", 
                "authors": "第一作者 et al.", 
                "year": "出版年份", 
                "objective": "研究目的 (請用繁體中文精簡摘要)" 
            },
            "methodology_table": [
                { 
                  "id": "題號 (如 1, 2, 3a)", 
                  "question": "題目簡述", 
                  "result": "Yes/No/CT", 
                  "evidence": "請用繁體中文，針對文獻內容具體說明判斷理由 (例如：文獻在第x頁提到了...所以符合/不符合)。" 
                }
            ],
            "methodology_summary": "請針對研究設計嚴謹度撰寫約 150 字的短評 (繁體中文)。"
        }
      `;

      const res = await callGemini(prompt, "你是一名嚴謹的實證醫學審查員，請依據證據回答。", true, config);
      setAiResult(res);
      setReappraisalSelection(new Set()); 
      
      // 初始化人類回答
      const initialHumanState = {};
      knowledge.human_scope.forEach(q => initialHumanState[q.id] = null);
      setHumanAnswers(initialHumanState);
      
      setStep(4);
    } catch (e) {
      setError(e.message);
      setStep(2);
    } finally {
      setIsLoading(false);
    }
  };

  // 處理重新評讀邏輯
  const handleReappraise = async () => {
    if (reappraisalSelection.size === 0) return;
    setIsReappraising(true);
    
    try {
        const text = await extractTextFromPdf(file);
        const itemsToReappraise = aiResult.methodology_table.filter(item => reappraisalSelection.has(item.id));
        
        const prompt = `
            任務：針對特定的評讀項目進行「重新評估 (Re-evaluation)」。
            使用者認為目前的評讀結果不夠精確，請仔細重新閱讀文獻內容，針對下列題目尋找更有力的證據。

            文獻內容：${text.substring(0, 35000)}
            
            需要重新評讀的項目：
            ${JSON.stringify(itemsToReappraise.map(i => ({id: i.id, question: i.question})))}

            請回傳 JSON 陣列 (Array)，格式如下：
            [
                { 
                  "id": "題號 (必須對應)", 
                  "result": "Yes/No/CT (重新判斷後的結果)", 
                  "evidence": "更詳盡、精確的繁體中文證據說明，請引用具體內容。" 
                }
            ]
        `;

        const newResults = await callGemini(prompt, "你是一名專注細節的資深審查員。", true, usedConfig);
        
        setAiResult(prev => {
            const newTable = prev.methodology_table.map(row => {
                const updatedItem = newResults.find(r => r.id === row.id);
                return updatedItem ? { ...row, result: updatedItem.result, evidence: updatedItem.evidence } : row;
            });
            return { ...prev, methodology_table: newTable };
        });

        setReappraisalSelection(new Set());

    } catch (e) {
        alert("重新評讀失敗: " + e.message);
    } finally {
        setIsReappraising(false);
    }
  };

  const toggleReappraisalItem = (id) => {
    setReappraisalSelection(prev => {
        const newSet = new Set(prev);
        if (newSet.has(id)) newSet.delete(id);
        else newSet.add(id);
        return newSet;
    });
  };

  const handleHumanInput = (id, value) => {

        // --- SUB-COMPONENT: Grade Tool ---
        const GradeTool = () => {
            const [step, setStep] = useState('upload'); 
            const [fullText, setFullText] = useState(null);
            const [appendix, setAppendix] = useState(null);
            const [extractedText, setExtractedText] = useState('');
            
            const [checklistResult, setChecklistResult] = useState(null);
            const [assessmentResult, setAssessmentResult] = useState(null);
            
            const [thresholdType, setThresholdType] = useState('null_effect');
            const [midValue, setMidValue] = useState('');
            
            const [loading, setLoading] = useState(false);
            const [status, setStatus] = useState('');
            const [error, setError] = useState(null);
            const [usedConfig, setUsedConfig] = useState(TASK_CONFIGS.grade);

            const handleInitialScan = async () => {
                if (!fullText) { setError("請上傳論文全文"); return; }
                setLoading(true); setStatus('解析文件與初步掃描中...'); setError(null);
                try {
                const config = TASK_CONFIGS.grade;
                setUsedConfig(config);

                const t1 = await extractTextFromPdf(fullText);
                const t2 = appendix ? await extractTextFromPdf(appendix) : "";
                const allText = `[FULL TEXT]\n${t1}\n\n[APPENDIX]\n${t2}`;
                setExtractedText(allText);
                
                const systemPrompt = `你是一位實證醫學專家。請根據論文文本進行初步資料查檢與資訊擷取。
                
                請務必精確提取以下資訊：
                1. 完整標題 (Title)
                2. 作者群 (Authors, 列出前三位或主要作者)
                3. 文獻出處 (Citation string, 格式如: 期刊名 Year;Vol(Issue):Pages 或 Cochrane ID)


                返回 JSON 格式如下：
                { 
                    "metadata": {
                    "title": "...",
                    "authors": "...",
                    "citation": "...",
                    },
                    "studyType": "SR of RCT" | "SR of NRS", 
                    "outcomes": {...}, 
                    "checklist": [{ "id": "...", "title": "...", "found": true/false, "evidence": "..." }], 
                    "summary": "..." 
                }`;
                
                const result = await callGemini(allText, systemPrompt, true, config);
                setChecklistResult(result);
                setStep('checklist');
                } catch (e) { setError("分析失敗，請重試"); console.error(e); } 
                finally { setLoading(false); }
            };

            const handleFullAssessment = async () => {
                setLoading(true); setStatus('正在根據 Core GRADE 規則進行深度評級...'); setError(null);
                try {
                const config = TASK_CONFIGS.grade;
                setUsedConfig(config);

                const thresholdInfo = { type: thresholdType, value: thresholdType === 'mid' ? midValue : 'Null Effect' };
                const rules = CORE_GRADE_RULES
                    .replace('{{THRESHOLD_TYPE}}', thresholdInfo.type === 'null_effect' ? '無效 (Null Effect)' : '最小重要差異 (MID)')
                    .replace('{{THRESHOLD_VALUE}}', thresholdInfo.value || 'N/A');

                const systemPrompt = `${rules}\n請返回 JSON: { "startLevel": "High/Low", "domains": [{name, downgrade, rating, reason, logicTrace}], "finalLevel": "...", "summary": "..." }`;
                
                const result = await callGemini(extractedText, systemPrompt, true, config);
                setAssessmentResult(result);
                setStep('assessment');
                } catch (e) { setError("評估失敗，請重試"); console.error(e); } 
                finally { setLoading(false); }
            };

            const FileUpload = ({ label, icon: Icon, file, setFile }) => (
                <div className={`relative border-2 border-dashed rounded-2xl p-6 transition-all ${file ? 'border-blue-500 bg-blue-50' : 'border-slate-300 hover:border-blue-400 bg-white'}`}>
                <input type="file" accept="application/pdf" className="absolute inset-0 w-full h-full opacity-0 cursor-pointer" onChange={(e) => setFile(e.target.files[0])} />
                <div className="flex flex-col items-center text-center gap-2">
                    <div className={`p-3 rounded-full ${file ? 'bg-blue-500 text-white' : 'bg-slate-100 text-slate-400'}`}><Icon size={24} /></div>
                    <span className="font-bold text-slate-700">{label}</span>
                    {file && <span className="text-xs text-blue-600 bg-blue-100 px-2 py-1 rounded-full">{file.name}</span>}
                </div>
                </div>
            );

            const handleExport = () => {
                if (!assessmentResult) return;

                const meta = checklistResult?.metadata || { title: 'N/A', authors: 'N/A', citation: 'N/A' };
                
                let checklistHtml = '';
                if (checklistResult?.checklist) {
                checklistHtml = `<table style="font-size: 0.85rem; margin-top: 5px;">
                    <thead><tr style="background:#f1f5f9;"><th width="30%">查檢項目</th><th width="15%">狀態</th><th width="55%">證據/備註</th></tr></thead>
                    <tbody>`;
                checklistResult.checklist.forEach(item => {
                    const statusBadge = item.found 
                    ? `<span style="color:#166534; background:#dcfce7; padding:2px 6px; border-radius:4px; font-size:0.7em; font-weight:bold;">Found</span>`
                    : `<span style="color:#b45309; background:#fef3c7; padding:2px 6px; border-radius:4px; font-size:0.7em; font-weight:bold;">Missing</span>`;
                    checklistHtml += `<tr>
                    <td>${item.title}</td>
                    <td>${statusBadge}</td>
                    <td style="color:#64748b; font-size:0.9em;">${item.evidence}</td>
                    </tr>`;
                });
                checklistHtml += `</tbody></table>`;
                }

                let gradeRowsHtml = '';
                assessmentResult.domains.forEach(domain => {
                const valStr = String(domain.downgrade || "0");
                const isDowngrade = valStr !== "0" && !valStr.includes("不降級") && !valStr.toLowerCase().includes("no");
                const badgeClass = isDowngrade ? 'badge-red' : 'badge-green';
                const badgeText = isDowngrade ? `降 ${valStr.replace(/\D/g,'')} 級` : '不降級';

                gradeRowsHtml += `
                    <tr>
                    <td style="font-weight:bold; color:#334155;">${domain.name}</td>
                    <td><span class="badge ${badgeClass}">${badgeText}</span></td>
                    <td>
                        <div style="font-weight:500; margin-bottom:4px;">${domain.reason}</div>
                        <div style="font-size:0.75em; color:#94a3b8; font-family:monospace; background:#f8fafc; padding:4px; border-radius:4px;">Trace: ${domain.logicTrace}</div>
                    </td>
                    </tr>
                `;
                });

                const contentHtml = `
                <div class="section-title">1. 文獻基本資訊 (Article Metadata)</div>
                <div style="background:#fff; border:1px solid #e2e8f0; border-radius:8px; padding:15px; margin-bottom:20px;">
                    <p style="margin:5px 0;"><strong>標題：</strong> ${meta.title}</p>
                    <p style="margin:5px 0;"><strong>作者：</strong> ${meta.authors}</p>
                    <p style="margin:5px 0;"><strong>出處：</strong> ${meta.citation}</p>
                    <p style="margin:5px 0;"><strong>研究類型：</strong> <span style="background:#eff6ff; color:#1e40af; padding:2px 8px; border-radius:99px; font-size:0.8em; font-weight:bold;">${checklistResult?.studyType || 'N/A'}</span></p>
                </div>

                <div class="section-title">2. 資料完整性查檢 (Data Checklist)</div>
                ${checklistHtml}

                <div class="section-title">3. 不精確性閾值設定 (Imprecision Setting)</div>
                <div style="background:#f8fafc; border-left:4px solid #6366f1; padding:12px; margin-bottom:20px; color:#475569;">
                    <strong>設定模式：</strong> ${thresholdType === 'mid' ? '最小重要差異 (MID)' : '無效 (Null Effect)'} <br/>
                    <strong>閾值數值：</strong> ${thresholdType === 'mid' ? midValue : 'Null Effect (1 or 0)'}
                </div>

                <div class="section-title">4. Core GRADE 評估結果 (Assessment Result)</div>
                
                <div style="background:#f0fdf4; border:1px solid #bbf7d0; padding:20px; border-radius:10px; text-align:center; margin-bottom:20px;">
                    <h2 style="color:#166534; margin:0 0 10px 0; font-size:1.8em;">${assessmentResult.finalLevel} Certainty</h2>
                    <div style="display:inline-block; background:#fff; padding:4px 12px; border-radius:99px; border:1px solid #bbf7d0; color:#64748b; font-size:0.85em; margin-bottom:10px;">
                    起始證據品質: <strong>${assessmentResult.startLevel}</strong>
                    </div>
                    <p style="color:#334155; line-height:1.6; margin:0;">${assessmentResult.summary}</p>
                </div>

                <table>
                    <thead><tr style="background:#f1f5f9;"><th width="20%">評估面向</th><th width="15%">評級結果</th><th width="65%">理由與邏輯追蹤</th></tr></thead>
                    <tbody>
                    ${gradeRowsHtml}
                    </tbody>
                </table>
                `;

                generatePDFReport("GRADE 證據品質評級報告", usedConfig, contentHtml);
            };

            return (
                <div className="max-w-4xl mx-auto py-4 animate-in fade-in slide-in-from-bottom-4 duration-500">
                    <div className="flex justify-between mb-8 px-4 relative">
                    {['upload', 'checklist', 'threshold', 'assessment'].map((s, i) => {
                        const labels = { upload: '上傳', checklist: '查檢', threshold: '設定', assessment: '評級' };
                        const active = step === s;
                        const passed = ['upload', 'checklist', 'threshold', 'assessment'].indexOf(step) > i;
                        return (
                        <div key={s} className="flex flex-col items-center gap-1 relative z-10">
                            <div className={`w-8 h-8 rounded-full flex items-center justify-center text-xs font-bold transition-all ${active ? 'bg-blue-600 text-white scale-110 shadow-lg' : passed ? 'bg-green-500 text-white' : 'bg-slate-200 text-slate-400'}`}>
                            {passed ? <CheckCircle className="w-4 h-4" /> : i + 1}
                            </div>
                            <span className={`text-xs font-bold ${active ? 'text-blue-600' : 'text-slate-400'}`}>{labels[s]}</span>
                        </div>
                        );
                    })}
                    <div className="absolute top-4 left-4 right-4 h-0.5 bg-slate-200 -z-0" />
                    </div>

                    {step === 'upload' && (
                    <div className="bg-white p-8 rounded-3xl shadow-sm border border-slate-100 space-y-6">
                        <h2 className="text-2xl font-black text-center mb-4">Core GRADE 資料上傳</h2>
                        <div className="grid md:grid-cols-2 gap-4">
                        <FileUpload label="上傳論文全文 (必填)" icon={FileText} file={fullText} setFile={setFullText} />
                        <FileUpload label="上傳附錄檔案 (建議)" icon={Layout} file={appendix} setFile={setAppendix} />
                        </div>
                        <button onClick={handleInitialScan} disabled={loading || !fullText} className="w-full py-4 bg-blue-600 text-white rounded-xl font-bold text-lg hover:bg-blue-700 disabled:bg-slate-200 disabled:text-slate-400 transition-all flex items-center justify-center gap-2">
                        {loading ? <Loader2 className="animate-spin" /> : <Search />} 開始 GRADE 掃描
                        </button>
                        {loading && <p className="text-center text-blue-600 animate-pulse">{status}</p>}
                    </div>
                    )}

                    {step === 'checklist' && checklistResult && (
                    <div className="bg-white p-6 rounded-3xl shadow-sm border border-slate-100">
                        <h2 className="text-xl font-bold mb-4 flex items-center gap-2"><List className="text-indigo-500" /> 資料完整性查檢</h2>
                        <div className="space-y-3 mb-6">
                        {checklistResult.checklist.map((item, idx) => (
                            <div key={idx} className="flex items-start gap-3 p-3 rounded-xl bg-slate-50">
                            {item.found ? <CheckCircle className="text-green-500 shrink-0 w-5 h-5" /> : <AlertCircle className="text-amber-500 shrink-0 w-5 h-5" />}
                            <div className="flex-1">
                                <div className="flex justify-between">
                                <span className="font-bold text-slate-700">{item.title}</span>
                                <span className={`text-[10px] px-2 py-0.5 rounded font-black uppercase ${item.found ? 'bg-green-100 text-green-700' : 'bg-amber-100 text-amber-700'}`}>{item.found ? 'Found' : 'Missing'}</span>
                                </div>
                                <p className="text-xs text-slate-500 mt-1">{item.evidence}</p>
                            </div>
                            </div>
                        ))}
                        </div>
                        <button onClick={() => setStep('threshold')} className="w-full py-3 bg-blue-600 text-white rounded-xl font-bold hover:bg-blue-700 flex items-center justify-center gap-2">
                        確認完畢，進入閾值設定 <ArrowRight size={18} />
                        </button>
                    </div>
                    )}

                    {step === 'threshold' && (
                    <div className="bg-white p-8 rounded-3xl shadow-lg border border-blue-100 max-w-2xl mx-auto">
                        <div className="text-center mb-6">
                        <Settings className="w-12 h-12 text-indigo-600 mx-auto mb-2" />
                        <h2 className="text-2xl font-bold text-slate-800">設定不精確性 (Imprecision)</h2>
                        <p className="text-slate-500 text-sm">AI 將根據此閾值判斷 95% CI 是否過寬</p>
                        </div>
                        <div className="space-y-4 mb-8">
                        <label className={`flex items-center gap-4 p-4 rounded-xl border-2 cursor-pointer transition-all ${thresholdType === 'null_effect' ? 'border-indigo-500 bg-indigo-50' : 'border-slate-200'}`}>
                            <input type="radio" name="threshold" value="null_effect" checked={thresholdType === 'null_effect'} onChange={(e) => setThresholdType(e.target.value)} className="w-5 h-5" />
                            <div><span className="font-bold block text-slate-800">無效 (Null Effect)</span><span className="text-xs text-slate-500">以 1 (RR/OR) 或 0 (MD) 為基準</span></div>
                        </label>
                        <label className={`flex items-center gap-4 p-4 rounded-xl border-2 cursor-pointer transition-all ${thresholdType === 'mid' ? 'border-indigo-500 bg-indigo-50' : 'border-slate-200'}`}>
                            <input type="radio" name="threshold" value="mid" checked={thresholdType === 'mid'} onChange={(e) => setThresholdType(e.target.value)} className="w-5 h-5" />
                            <div className="flex-1">
                            <span className="font-bold block text-slate-800">最小重要差異 (MID)</span>
                            <input type="text" placeholder="輸入數值 (如: 5 )" disabled={thresholdType !== 'mid'} value={midValue} onChange={(e) => setMidValue(e.target.value)} className="mt-1 w-full p-2 border rounded text-sm" />
                            </div>
                        </label>
                        </div>
                        <button onClick={handleFullAssessment} disabled={loading} className="w-full py-4 bg-indigo-600 text-white rounded-xl font-bold text-lg hover:bg-indigo-700 flex items-center justify-center gap-2">
                        {loading ? <Loader2 className="animate-spin" /> : <Target />} 啟動 Core GRADE 評估
                        </button>
                    </div>
                    )}

                    {step === 'assessment' && assessmentResult && (
                    <div className="space-y-6">
                        <div className="bg-slate-900 text-white p-8 rounded-3xl shadow-xl flex flex-col md:flex-row items-center justify-between gap-6">
                        <div>
                            <h2 className="text-3xl font-black mb-2 flex items-center gap-3"><Award className="text-green-400" /> {assessmentResult.finalLevel} Certainty</h2>
                            <p className="text-slate-400 font-medium">{assessmentResult.summary}</p>
                        </div>
                        <div className="text-right"><span className="text-xs font-bold uppercase tracking-widest text-slate-500 block mb-1">起始品質</span><span className="font-bold text-xl text-slate-300">{assessmentResult.startLevel}</span></div>
                        </div>
                        
                        <div className="grid gap-4">
                        {assessmentResult.domains.map((domain, idx) => {
                            const rawStr = String(domain.downgrade || "0").trim();
                            const match = rawStr.match(/-?\d+/);
                            
                            let level = 0;
                            if (match) {
                            level = Math.abs(parseInt(match[0], 10));
                            } else {
                            const lower = rawStr.toLowerCase();
                            const safeKeywords = ["no ", "no.", "none", "not", "n/a", "negligible", "不", "無", "未", "非", "0"];
                            const isSafe = lower === "no" || safeKeywords.some(kw => lower.includes(kw));
                            if (!isSafe) {
                                level = 1;
                            }
                            }
                            
                            const isDowngrade = level > 0;

                            return (
                            <div key={idx} className="bg-white p-6 rounded-2xl shadow-sm border border-slate-100">
                                <div className="flex justify-between items-start mb-2">
                                <h3 className="font-bold text-lg text-slate-800">{domain.name}</h3>
                                <span className={`px-2 py-1 rounded text-xs font-black uppercase ${!isDowngrade ? 'bg-green-100 text-green-700' : 'bg-red-100 text-red-700'}`}>
                                    {!isDowngrade ? '不降級' : `降 ${level} 級`}
                                </span>
                                </div>
                                <p className="text-slate-600 font-medium mb-3">{domain.reason}</p>
                                <div className="bg-slate-50 p-3 rounded-lg border border-slate-200 text-xs text-slate-500 font-mono flex gap-2">
                                <Terminal size={14} className="shrink-0 mt-0.5" /> {domain.logicTrace}
                                </div>
                            </div>
                            );
                        })}
                        </div>
                        <div className="flex justify-end mb-4">
                        <button onClick={handleExport} className="flex items-center gap-2 bg-blue-600 text-white px-6 py-3 rounded-xl font-bold hover:bg-blue-700 transition-shadow shadow-md">
                            <Download className="w-5 h-5" /> 匯出評級報告 PDF
                        </button>
                        </div>

                        <div className="mt-8 mb-4 p-4 bg-slate-50 rounded-xl border border-slate-200 flex flex-wrap justify-center gap-6">
                        <div className="flex items-center gap-2 text-xs">
                            <Zap className="w-3 h-3 text-blue-500" /> 
                            <span className="text-slate-500">Model: <b>{getCurrentModelDisplay()}</b></span>
                        </div>
                        <div className="flex items-center gap-2 text-xs">
                            <Hash className="w-3 h-3 text-blue-500" /> 
                            <span className="text-slate-500">Ver: <b>{APP_VERSION}</b></span>
                        </div>
                        <div className="flex items-center gap-2 text-xs">
                            <Target className="w-3 h-3 text-blue-500" /> 
                            <span className="text-slate-500">Top-P: <b>{usedConfig.topP}</b></span>
                        </div>
                        <div className="flex items-center gap-2 text-xs">
                            <Activity className="w-3 h-3 text-blue-500" /> 
                            <span className="text-slate-500">Temp: <b>{usedConfig.temperature}</b></span>
                        </div>
                        </div>

                        <button onClick={() => setStep('upload')} className="w-full py-4 text-slate-400 border-2 border-dashed rounded-xl font-bold hover:bg-slate-50">評估下一篇</button>
                    </div>
                    )}
                </div>
            );
        };

        // --- MAIN APPLICATION ENTRY ---
        function App() {
            const [isAuthenticated, setIsAuthenticated] = useState(false);
            const [mode, setMode] = useState('home');
            const [isSettingsOpen, setIsSettingsOpen] = useState(false); // [新增] 控制設定視窗狀態

            const handleLoginSuccess = () => {
                setIsAuthenticated(true);
            };

            if (!isAuthenticated) {
                return <LoginScreen onLogin={handleLoginSuccess} />;
            }

            const modeConfig = {
                search: { color: 'bg-indigo-600', label: 'PubMed Search Bot' },
                appraisal: { color: 'bg-teal-600', label: 'Literature Appraiser' },
                grade: { color: 'bg-blue-600', label: 'GRADE Assessment Tool' },
                home: { color: 'bg-indigo-600', label: '' }
            };

            const currentConfig = modeConfig[mode] || modeConfig.home;

            return (
                <div className="min-h-screen bg-slate-50 font-sans text-slate-900 selection:bg-indigo-100">
                    
                    {/* [新增] 設定視窗組件 */}
                    <SettingsModal isOpen={isSettingsOpen} onClose={() => setIsSettingsOpen(false)} />

                    <header className={`sticky top-0 z-50 bg-white/80 backdrop-blur-md border-b border-slate-200 transition-all ${mode !== 'home' ? 'py-3' : 'py-6'}`}>
                        <div className="max-w-6xl mx-auto px-6 flex justify-between items-center">
                            <div className="flex items-center gap-3 cursor-pointer group" onClick={() => setMode('home')}>
                                <div className={`p-2 rounded-xl text-white shadow-lg transition-all group-hover:scale-110 ${currentConfig.color}`}>
                                    <Award className="w-6 h-6" />
                                </div>
                                <div>
                                    <h2 className="text-lg font-black tracking-tighter uppercase">Artificial Intelligence Evidence-based Medicine Bot</h2>
                                    {mode !== 'home' && <p className="text-[10px] font-black text-slate-400 uppercase tracking-widest leading-none">{currentConfig.label}</p>}
                                </div>
                            </div>
                            
                            <div className="flex items-center gap-3">
                                {/* [新增] 設定按鈕 */}
                                <button 
                                    onClick={() => setIsSettingsOpen(true)}
                                    className="p-2.5 bg-slate-100 text-slate-500 hover:bg-indigo-50 hover:text-indigo-600 rounded-xl transition-all"
                                    title="模型與 API 設定"
                                >
                                    <Settings className="w-5 h-5" />
                                </button>

                                {mode !== 'home' && (
                                    <button onClick={() => setMode('home')} className="flex items-center gap-2 text-sm font-bold text-slate-500 hover:text-slate-900 bg-slate-100 px-4 py-2 rounded-xl transition-colors">
                                        <Home className="w-4 h-4" /> <span className="hidden sm:inline">返回主頁</span>
                                    </button>
                                )}
                                <button onClick={() => setIsAuthenticated(false)} className="p-2.5 text-slate-300 hover:text-rose-500 transition-colors">
                                    <Lock className="w-4 h-4" />
                                </button>
                            </div>
                        </div>
                    </header>

                    <main className="max-w-6xl mx-auto px-6 py-10">
                        {/* 1. 主頁面 (Home): 顯示三個功能選擇卡片 */}
                        {mode === 'home' && (
                            <div className="max-w-5xl mx-auto animate-in fade-in zoom-in duration-700">
                                <div className="text-center mb-16">
                                    <h2 className="text-5xl font-black text-slate-900 tracking-tight mb-4">慧實證</h2>
                                    <p className="text-xl text-slate-500 font-medium">整合自動化檢索、CASP 評讀與 GRADE 評級，加速您的實證研究工作流。</p>
                                </div>

                                <div className="grid grid-cols-1 md:grid-cols-3 gap-6">
                                    {/* 卡片：深度文獻檢索 */}
                                    <div onClick={() => setMode('search')} className="group relative bg-white p-8 rounded-[2.5rem] shadow-xl shadow-slate-200 border border-white hover:border-indigo-200 hover:-translate-y-2 transition-all cursor-pointer overflow-hidden">
                                        <div className="absolute top-0 right-0 p-8 bg-indigo-50 rounded-full -mr-8 -mt-8 group-hover:bg-indigo-600 transition-colors">
                                            <Search className="w-10 h-10 text-indigo-600 group-hover:text-white" />
                                        </div>
                                        <div className="relative z-10 pt-4">
                                            <span className="text-[10px] font-black text-indigo-600 uppercase tracking-widest bg-indigo-50 px-2 py-1 rounded-full">Automation</span>
                                            <h3 className="text-2xl font-black mt-3 mb-2">深度文獻檢索</h3>
                                            <p className="text-slate-500 text-sm leading-relaxed mb-6">自動拆解 PICO 並執行 PubMed Best Match 檢索。</p>
                                            <div className="flex items-center gap-2 text-indigo-600 font-bold text-sm">立即開始 <ArrowRight className="w-4 h-4" /></div>
                                        </div>
                                    </div>

                                    {/* 卡片：文獻品質評讀 */}
                                    <div onClick={() => setMode('appraisal')} className="group relative bg-white p-8 rounded-[2.5rem] shadow-xl shadow-slate-200 border border-white hover:border-teal-200 hover:-translate-y-2 transition-all cursor-pointer overflow-hidden">
                                        <div className="absolute top-0 right-0 p-8 bg-teal-50 rounded-full -mr-8 -mt-8 group-hover:bg-teal-600 transition-colors">
                                            <FileText className="w-10 h-10 text-teal-600 group-hover:text-white" />
                                        </div>
                                        <div className="relative z-10 pt-4">
                                            <span className="text-[10px] font-black text-teal-600 uppercase tracking-widest bg-teal-50 px-2 py-1 rounded-full">CASP Expert</span>
                                            <h3 className="text-2xl font-black mt-3 mb-2">文獻品質評讀</h3>
                                            <p className="text-slate-500 text-sm leading-relaxed mb-6">上傳 PDF 進行 CASP 標準查檢與信度評估。</p>
                                            <div className="flex items-center gap-2 text-teal-600 font-bold text-sm">立即開始 <ArrowRight className="w-4 h-4" /></div>
                                        </div>
                                    </div>

                                    {/* 卡片：證據品質評級 */}
                                    <div onClick={() => setMode('grade')} className="group relative bg-white p-8 rounded-[2.5rem] shadow-xl shadow-slate-200 border border-white hover:border-blue-200 hover:-translate-y-2 transition-all cursor-pointer overflow-hidden">
                                        <div className="absolute top-0 right-0 p-8 bg-blue-50 rounded-full -mr-8 -mt-8 group-hover:bg-blue-600 transition-colors">
                                            <ShieldCheck className="w-10 h-10 text-blue-600 group-hover:text-white" />
                                        </div>
                                        <div className="relative z-10 pt-4">
                                            <span className="text-[10px] font-black text-blue-600 uppercase tracking-widest bg-blue-50 px-2 py-1 rounded-full">Core GRADE</span>
                                            <h3 className="text-2xl font-black mt-3 mb-2">證據品質評級</h3>
                                            <p className="text-slate-500 text-sm leading-relaxed mb-6">依據偏誤風險、不一致性等維度判定證據等級。</p>
                                            <div className="flex items-center gap-2 text-blue-600 font-bold text-sm">立即開始 <ArrowRight className="w-4 h-4" /></div>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        )}

                        {/* 2. 工具分流 (Tools): 根據選取的模式渲染對應組件 */}
                        {mode === 'search' && <SearchTool />}
                        {mode === 'appraisal' && <AppraisalTool />}
                        {mode === 'grade' && <GradeTool />}
                    </main>
                </div>
            );
        }

        const root = createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
