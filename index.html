    const LucideIcon = ({ iconName, className, size = 24, ...props }) => {
      const iconData = window.lucide?.icons?.[iconName];
      if (!iconData) {
        console.warn(`Icon ${iconName} not found`);
        return <svg className={className} width={size} height={size} {...props} />;
      }
      
      const renderNode = (node, i) => {
        if (!node) return null;
        const [tag, attrs, children] = node;
        return React.createElement(
          tag,
          { ...attrs, key: i },
          children ? children.map((child, j) => renderNode(child, j)) : null
        );
      };

      return React.createElement(
        'svg',
        {
          ...iconData[1],
          width: size,
          height: size,
          className: `lucide lucide-${iconName.toLowerCase()} ${className || ''}`,
          ...props,
        },
        iconData[2] ? iconData[2].map((child, i) => renderNode(child, i)) : null
      );
    };

        }
      };

      const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/${model}:generateContent?key=${apiKey}`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(payload)
      });

      const result = await response.json();
      
      if (result.error) {
        throw new Error(`Gemini API 錯誤: ${result.error.message} 😧`);
      }

      const text = result.candidates?.[0]?.content?.parts?.[0]?.text;
      return isJson ? JSON.parse(text) : text;
    }

    async function lookupMeSHTerm(term) {
      try {
        const url = `https://id.nlm.nih.gov/mesh/lookup/term?label=${encodeURIComponent(term)}&match=exact&limit=5`;
        const response = await fetch(url, { headers: { 'Accept': 'application/json' } });
        if (!response.ok) return null;
        let data = await response.json();

        if (!data || data.length === 0) {
          const fuzzyUrl = `https://id.nlm.nih.gov/mesh/lookup/term?label=${encodeURIComponent(term)}&match=contains&limit=5`;
          const fuzzyRes = await fetch(fuzzyUrl, { headers: { 'Accept': 'application/json' } });
          data = await fuzzyRes.json();
        }

        if (data && data.length > 0) {
          const descriptor = data.find(item => item.resource && item.resource.includes('/mesh/D'));
          if (descriptor) return descriptor.label;
          const scr = data[0];
          if (scr.resource && scr.resource.includes('/mesh/C')) {
            const scrId = scr.resource.split('/').pop();
            const detailUrl = `https://id.nlm.nih.gov/mesh/lookup/details?supplementaryConcept=${scrId}`;
            const detailRes = await fetch(detailUrl, { headers: { 'Accept': 'application/json' } });
            if (detailRes.ok) {
              const details = await detailRes.json();
              if (details.hm && details.hm.length > 0) return details.hm[0].label;
            }
          }
          return scr.label;
        }
        return null;
      } catch (error) {
        return null;
      }
    }

    async function fetchPubMedIds(query) {
      const searchUrl = `https://eutils.ncbi.nlm.nih.gov/entrez/eutils/esearch.fcgi?db=pubmed&term=${encodeURIComponent(query)}&retmax=500&sort=relevance&retmode=json&api_key=${PUBMED_API_KEY}`;
      const res = await fetch(searchUrl);
      const data = await res.json();
      return {
        ids: data.esearchresult.idlist || [],
        totalCount: parseInt(data.esearchresult.count) || 0
      };
    }

    async function fetchPubMedDetails(ids) {
      if (ids.length === 0) return [];
      const fetchUrl = `https://eutils.ncbi.nlm.nih.gov/entrez/eutils/efetch.fcgi?db=pubmed&id=${ids.join(',')}&retmode=xml&api_key=${PUBMED_API_KEY}`;
      const res = await fetch(fetchUrl);
      const xmlText = await res.text();
      const parser = new DOMParser();
      const xmlDoc = parser.parseFromString(xmlText, "application/xml");
      const articles = xmlDoc.getElementsByTagName("PubmedArticle");
      
      const resultsMap = {};
      
      for (let i = 0; i < articles.length; i++) {
        const art = articles[i];
        const pmid = art.getElementsByTagName("PMID")[0]?.textContent || "";
        const title = art.getElementsByTagName("ArticleTitle")[0]?.textContent || "無標題";
        let abstractParts = art.getElementsByTagName("AbstractText");
        let abstract = Array.from(abstractParts)
          .map(node => (node.getAttribute("Label") ? `${node.getAttribute("Label")}: ` : "") + node.textContent)
          .join(" ");
        const journalObj = art.getElementsByTagName("Journal")[0];
        const jTitle = journalObj?.getElementsByTagName("ISOAbbreviation")[0]?.textContent || "";
        const year = journalObj?.getElementsByTagName("Year")[0]?.textContent || 
                     journalObj?.getElementsByTagName("PubDate")[0]?.getElementsByTagName("Year")[0]?.textContent || "";

        resultsMap[pmid] = { pmid, title, abstract: abstract || "無摘要", source: jTitle, year, url: `https://pubmed.ncbi.nlm.nih.gov/${pmid}/` };
      }

      return ids.map(id => resultsMap[id]).filter(Boolean);
    }

    const extractTextFromPdf = async (file) => {
      const arrayBuffer = await file.arrayBuffer();
      
      if (!window.pdfjsLib) {
        const script = document.createElement('script');
        script.src = PDF_JS_SRC;
        document.head.appendChild(script);
        await new Promise((resolve) => script.onload = resolve);
      }
      
      if (window.pdfjsLib && !window.pdfjsLib.GlobalWorkerOptions.workerSrc) {
        window.pdfjsLib.GlobalWorkerOptions.workerSrc = PDF_JS_WORKER_SRC;
      }

      const loadingTask = window.pdfjsLib.getDocument({ data: arrayBuffer });
      const pdf = await loadingTask.promise;
      let fullText = '';
      const maxPages = Math.min(pdf.numPages, 30);
      for (let i = 1; i <= maxPages; i++) {
        const page = await pdf.getPage(i);
        const textContent = await page.getTextContent();
        fullText += textContent.items.map((item) => item.str).join(' ') + '\n';
      }
      return fullText;
    };

                    </div>
                </div>

                <div className="bg-teal-700 text-white rounded-xl shadow-md p-6 mb-8">
                    <h3 className="text-lg font-bold mb-3 flex items-center gap-2">
                        <FileCheck className="w-6 h-6" /> 整體評讀結論 (Overall Conclusion)
                    </h3>
                    <p className="text-teal-50 leading-relaxed whitespace-pre-wrap text-lg">{finalSummary.conclusion}</p>
                </div>

                {drawingPrompt && (
                    <div className="bg-slate-900 rounded-2xl p-6 border-l-4 border-indigo-500 animate-in fade-in duration-500">
                        <div className="flex justify-between items-center mb-4">
                            <h4 className="text-indigo-400 text-xs font-black uppercase tracking-widest flex items-center gap-2">
                                <Layers className="w-4 h-4" /> AI Visualization Prompt (Nano Banana)
                            </h4>
                            <button 
                                onClick={() => {
                                    navigator.clipboard.writeText(drawingPrompt);
                                    alert("Prompt 已複製到剪貼簿！");
                                }}
                                className="text-[10px] bg-indigo-500/20 text-indigo-300 px-3 py-1 rounded-full hover:bg-indigo-500 hover:text-white transition-all flex items-center gap-1"
                            >
                                <ClipboardList className="w-3 h-3" /> 點擊複製
                            </button>
                        </div>
                        <pre className="text-[11px] text-slate-300 font-mono whitespace-pre-wrap leading-relaxed max-h-60 overflow-y-auto custom-scrollbar">
                            {drawingPrompt}
                        </pre>
                    </div>
                )}
            </div>

            <div className="flex flex-col md:flex-row gap-4 mt-8 pt-8 border-t border-slate-100 justify-end">
                <button 
                    onClick={handleGenerateDrawingPrompt} 
                    disabled={isRefining}
                    className="flex items-center justify-center gap-2 bg-indigo-50 text-indigo-700 border-2 border-indigo-100 px-6 py-3 rounded-xl font-black hover:bg-indigo-600 hover:text-white transition-all active:scale-95 disabled:opacity-50"
                >
                    {isRefining ? <Loader2 className="animate-spin w-5 h-5" /> : <BarChart3 className="w-5 h-5" />}
                    {isRefining ? "正在生成內容..." : "生成視覺化繪圖 Prompt"}
                </button>
                
                <button onClick={handleExportCombined} className="flex items-center justify-center gap-2 bg-teal-600 text-white px-6 py-3 rounded-xl font-bold hover:bg-teal-700 transition-shadow shadow-md active:scale-95">
                    <Download className="w-5 h-5" /> 匯出評讀報告 PDF
                </button>
            </div>

            <div className="p-4 bg-slate-50 rounded-2xl flex flex-wrap justify-around gap-6 mt-6">
                <div className="flex flex-col items-center gap-1">
                    <div className="flex items-center gap-1 text-[10px] text-slate-400 font-black uppercase tracking-widest">
                        <Zap className="w-3 h-3 text-teal-500" /> Model
                    </div>
                    <span className="text-sm font-bold text-slate-700">{usedConfig.model}</span>
                </div>
                <div className="flex flex-col items-center gap-1">
                    <div className="flex items-center gap-1 text-[10px] text-slate-400 font-black uppercase tracking-widest">
                        <Hash className="w-3 h-3 text-teal-500" /> Version
                    </div>
                    <span className="text-sm font-bold text-slate-700">{APP_VERSION}</span>
                </div>
                <div className="flex flex-col items-center gap-1">
                    <div className="flex items-center gap-1 text-[10px] text-slate-400 font-black uppercase tracking-widest">
                        <Target className="w-3 h-3 text-teal-500" /> Top-P
                    </div>
                    <span className="text-sm font-bold text-slate-700">{usedConfig.topP}</span>
                </div>
                <div className="flex flex-col items-center gap-1">
                    <div className="flex items-center gap-1 text-[10px] text-slate-400 font-black uppercase tracking-widest">
                        <Activity className="w-3 h-3 text-teal-500" /> Temperature
                    </div>
                    <span className="text-sm font-bold text-slate-700">{usedConfig.temperature}</span>
                </div>
            </div>
        </div>
    )}
                </div>
            )}
        </div>
      );
    };

    function App() {
      const [isAuthenticated, setIsAuthenticated] = useState(false);
      const [hasAcceptedTerms, setHasAcceptedTerms] = useState(false);
      const [mode, setMode] = useState('home');
      const [geminiKey, setGeminiKey] = useState('');
      const [isSettingsOpen, setIsSettingsOpen] = useState(false);

      if (!isAuthenticated) {
        return <LoginScreen onLogin={(status, key) => {
          setIsAuthenticated(status);
          setGeminiKey(key); 
        }} />;
      }

      if (!hasAcceptedTerms) {
        return <DisclaimerModal onAccept={() => setHasAcceptedTerms(true)} />;
      }

      const modeConfig = {
        search: { color: 'bg-indigo-600', label: 'PubMed Search Bot' },
        appraisal: { color: 'bg-teal-600', label: 'Literature Appraiser' },
        home: { color: 'bg-indigo-600', label: '' }
      };

      const currentConfig = modeConfig[mode] || modeConfig.home;

      return (
        <div className="min-h-screen bg-slate-50 font-sans text-slate-900 selection:bg-indigo-100">
          <header className={`sticky top-0 z-50 bg-white/80 backdrop-blur-md border-b border-slate-200 transition-all ${mode !== 'home' ? 'py-3' : 'py-6'}`}>
      <div className="max-w-6xl mx-auto px-6 flex justify-between items-center">
        
        {/* 左側 Logo 與標題 */}
        <div className="flex items-center gap-3 cursor-pointer group" onClick={() => setMode('home')}>
          <div className={`p-2 rounded-xl text-white shadow-lg transition-all group-hover:scale-110 ${currentConfig.color}`}>
            <Award className="w-6 h-6" />
          </div>
          <div>
            <h1 className="text-lg font-black tracking-tighter">AI Evidence-based Medicine Bot</h1>
            {mode !== 'home' && <p className="text-[10px] font-bold text-slate-400 uppercase tracking-widest">{currentConfig.label}</p>}
          </div>
        </div>

        {/* 右側按鈕區 */}
        <div className="flex items-center gap-3">
          <button 
            onClick={() => setIsSettingsOpen(true)} 
            className="flex items-center gap-2 text-sm font-bold text-slate-500 hover:text-indigo-600 bg-slate-50 hover:bg-indigo-50 px-3 py-2 rounded-xl transition-all border border-transparent hover:border-indigo-100"
          >
            <Settings className="w-4 h-4" />
            <span className="hidden sm:inline">系統設定</span>
          </button>

          {mode !== 'home' && (
            <button onClick={() => setMode('home')} className="flex items-center gap-2 text-sm font-bold text-slate-500 hover:text-slate-900 bg-slate-100 px-4 py-2 rounded-xl transition-colors">
              <Home className="w-4 h-4" /> 
              <span className="hidden sm:inline">返回首頁</span>
            </button>
          )}

          <button onClick={() => setIsAuthenticated(false)} className="p-2 text-slate-300 hover:text-rose-500 transition-colors" title="登出系統">
            <Lock className="w-4 h-4" />
          </button>
        </div>

      </div>
    </header>

          <main className="max-w-6xl mx-auto px-6 py-10">
            {mode === 'home' && (
              <div className="max-w-5xl mx-auto animate-in fade-in zoom-in duration-700">
                <div className="text-center mb-16">
                  <h2 className="text-5xl font-black text-slate-900 tracking-tight mb-4">慧實證</h2>
                  <p className="text-xl text-slate-500 font-medium">整合自動化檢索與 CASP 評讀，加速實證醫學流程。</p>
                </div>

                <div className="grid grid-cols-1 md:grid-cols-2 gap-8 max-w-4xl mx-auto">
                  <div onClick={() => setMode('search')} className="group relative bg-white p-10 rounded-[2.5rem] shadow-xl shadow-slate-200 border border-white hover:border-indigo-200 hover:-translate-y-2 transition-all cursor-pointer overflow-hidden">
                    <div className="absolute top-0 right-0 p-8 bg-indigo-50 rounded-full -mr-8 -mt-8 group-hover:bg-indigo-600 transition-colors">
                      <Search className="w-12 h-12 text-indigo-600 group-hover:text-white" />
                    </div>
                    <div className="relative z-10">
                      <span className="text-[10px] font-black text-indigo-600 uppercase tracking-widest bg-indigo-50 px-2 py-1 rounded-full">Automation</span>
                      <h3 className="text-2xl font-black mt-4 mb-2">深度文獻檢索</h3>
                      <p className="text-slate-500 text-sm leading-relaxed mb-6">自動拆解 PICO 並執行精準檢索。</p>
                      <div className="flex items-center gap-2 text-indigo-600 font-bold text-sm">啟動檢索 <ArrowRight className="w-4 h-4" /></div>
                    </div>
                  </div>

                  <div onClick={() => setMode('appraisal')} className="group relative bg-white p-10 rounded-[2.5rem] shadow-xl shadow-slate-200 border border-white hover:border-teal-200 hover:-translate-y-2 transition-all cursor-pointer overflow-hidden">
                    <div className="absolute top-0 right-0 p-8 bg-teal-50 rounded-full -mr-8 -mt-8 group-hover:bg-teal-600 transition-colors">
                      <FileText className="w-12 h-12 text-teal-600 group-hover:text-white" />
                    </div>
                    <div className="relative z-10">
                      <span className="text-[10px] font-black text-teal-600 uppercase tracking-widest bg-teal-50 px-2 py-1 rounded-full">CASP Expert</span>
                      <h3 className="text-2xl font-black mt-4 mb-2">文獻品質評讀</h3>
                      <p className="text-slate-500 text-sm leading-relaxed mb-6">標準化查檢與 AI 證據引用分析。</p>
                      <div className="flex items-center gap-2 text-teal-600 font-bold text-sm">啟動評讀 <ArrowRight className="w-4 h-4" /></div>
                    </div>
                  </div>
                </div>
              </div>
            )}

            {mode === 'search' && <SearchTool geminiKey={geminiKey} />}
            {mode === 'appraisal' && <AppraisalTool geminiKey={geminiKey} />}
          </main>
          <SettingsModal 
            isOpen={isSettingsOpen} 
            onClose={() => setIsSettingsOpen(false)} 
            geminiKey={geminiKey}
            setGeminiKey={setGeminiKey}
          />
        </div>
      );
    }

    // 將 App 元件渲染到 HTML 的 root 節點
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
